name: Alertas de Empleo Bot

on:
  schedule:
    # Ejecutar cada 5 minutos
    - cron: '*/5 * * * *'
  # Permite ejecutarlo manualmente desde GitHub (para probar)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          # Búsquedas amplias en CT (pocas, para ser eficientes con ScraperAPI)
          CT_QUERY: "desarrollador,programador,ingeniero informatico,fullstack"
          # Whitelist: la oferta DEBE tener al menos una de estas tecnologías para notificar
          WHITELIST_KEYWORDS: "javascript,typescript,node,react,python,css,html,express,docker,angular,postgresql,mongodb,sql,next,vite,fastapi,django,flask,c#,.net"
          # Blacklist: si aparece cualquiera de estas, la oferta se descarta
          BLACKLIST_KEYWORDS: "java,ruby,php,scala,kotlin,cobol,sap,mainframe,vue,vue.js"
        run: node test_scraper.js
